[env:tiny816]
platform = atmelmegaavr
board = ATtiny816
framework = arduino

# This tells PIO to use the megaTinyCore logic
board_build.f_cpu = 16000000L

# megaTinyCore specific packages
platform_packages =
    framework-arduino-megaavr-megatinycore@https://github.com/SpenceKonde/megaTinyCore.git

# Force the inclusion of the Touch library
build_flags = -DUSE_TINY_TOUCH

# Setup for UPDI programming (using a serial adapter + resistor)
upload_protocol = serialupdi
upload_flags =
    -xrtsdtr=high

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.11.0





    